<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Info Table</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container pt-5">
    <a href="reg.html" class="btn btn-primary">Add New</a>
    
</div>
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">User Information</h4>
        </div>

        <div class="card-body">
            <table class="table table-bordered table-hover table-striped text-center">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Contact</th>
                        <th>Hobby</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="userdata">
                  
                </tbody>
            </table>
           
        </div>
    </div>
</div>
 

<script>
     
       function getUserData(){
            let userArray = localStorage.getItem('user');
            if(userArray){
                userArray= JSON.parse(userArray);
                console.log(userArray);
                let str="";
                userArray.forEach((index,i)=>{
                    console.log(index);
                    str+=`
                     <tr>
                        <td>${i+1}</td>
                        <td>${index.username}</td>
                        <td>${index.email}</td>
                        <td>${index.contact}</td>
                        <td>${index.hobby}</td>
                        <td>
                           <button class="btn btn-danger" onclick="delUser(${i})">Delete</button>
                        <a href="edituser.html?userid=${i}" class="btn btn-success" >Edit</a>
                        </td>
                    </tr>
                    `
                })
                document.getElementById('userdata').innerHTML=str;
            }
       }

       window.onload = getUserData

       function delUser(userid){
           
        if(localStorage.getItem('user')){
            let oldArray = JSON.parse(localStorage.getItem('user'));
            console.log(oldArray);
            oldArray.splice(userid,1);
            localStorage.setItem('user',JSON.stringify(oldArray));
            getUserData();
             
        }
       }
</script>

</body>
</html>
