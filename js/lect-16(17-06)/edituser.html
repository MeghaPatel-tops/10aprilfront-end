<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Update</title>
    

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container">
        <div class="row justify-content-center min-vh-100 align-items-center">
            <div class="col-md-5">

                <div class="card shadow border-0">
                    <div class="card-body p-4">

                        <h2 class="text-center mb-4">User Update</h2>

                        <form id="regfrm" method="post">
                            <div class="mb-3" id="uerror">
                                <label class="form-label">Username</label>
                                <input
                                    id="username"
                                    type="text"
                                    class="form-control"
                                    placeholder="Enter username">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input
                                id="email"
                                    type="email"
                                    class="form-control"
                                    placeholder="Enter email">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input
                                    id="pwd"
                                    type="password"
                                    class="form-control"
                                    placeholder="Enter password">
                                <div id="pwderr" style="color: red;display: none;">
                                    <p id="pwd-1">A-Z a-z</p>
                                    <p id="pwd-2">0-9</p>
                                    <p id="pwd-3">special symbol</p>
                                    <p id="pwd-4">max len >= 8</p>
                                </div>    
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Contact Number</label>
                                <input
                                    id="contact"
                                    type="tel"
                                    class="form-control"
                                    placeholder="Enter contact number">
                            </div>
                             <div class="mb-3">
                                <label class="form-label">Contact Hobby:</label>
                                <input
                                    type="checkbox"
                                    id="hobby"
                                    placeholder="Enter contact number" value="Music">Music
                                     <input
                                    type="checkbox"
                                    id="hobby"
                                    placeholder="Enter contact number" value="Dance">Dance
                                     <input
                                    type="checkbox"
                                    id="hobby"
                                    placeholder="Enter contact number" value="Sports">Sports

                            </div>

                            <button type="submit" class="btn btn-primary w-100">
                                Update
                            </button>
                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>

     <script>

        let username = document.getElementById('username');
                let email = document.getElementById('email');
                let pwd = document.getElementById('pwd');
                let contact = document.getElementById('contact');
        const params = new URLSearchParams(window.location.search);

        const id = params.get("userid");
        

        function getSingleUser(id){
            if(localStorage.getItem('user')){
            let oldArray = JSON.parse(localStorage.getItem('user'));
            let singleUser = oldArray[id];
            console.log(singleUser);
            username.value=singleUser.username;
            email.value=singleUser.email;
            pwd.value=singleUser.pwd;
            contact.value=singleUser.contact;
            hbstr= singleUser.hobby;
            hbArray = hbstr.split("-");
            console.log(hbArray);
               let hobby = document.querySelectorAll('#hobby')
         
       
                hobby.forEach(element => {
                      if(hbArray.some(index=>index==element.value)){
                           element.checked= true;
                      }
                });
            
            }
        }


        document.getElementById('regfrm').addEventListener('submit',function(e){
        e.preventDefault();
        
        let hobby = document.querySelectorAll('#hobby')
       console.log(hobby);
       
        let hbArray = [];
        count=0;
        hobby.forEach(element => {
             if(element.checked == true){
                 hbArray.push(element.value)
                count++;
             }
            
        });
        if(count==0){
            alert("please select your hobby")
        }
        hbArray = hbArray.join("-");
       
        let username = document.getElementById('username').value;
        let email = document.getElementById('email').value;
        let pwd = document.getElementById('pwd').value;
        let contact = document.getElementById('contact').value;
      
       

     
        
          let user = {
            username:username,
            email:email,
            pwd:pwd,
            contact:contact,
            hobby:hbArray
        }
       

        if(localStorage.getItem('user')){
            let oldArray = JSON.parse(localStorage.getItem('user'));
             oldArray.splice(id,1,user)
            localStorage.setItem('user',JSON.stringify(oldArray));

        }
        
       
        window.location.href="userdata.html"
        
        
})

        window.onload= getSingleUser(id)
    </script>
</body>
</html>
