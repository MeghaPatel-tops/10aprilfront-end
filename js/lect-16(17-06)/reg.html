<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration</title>
    <script src="script.js" defer></script>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container">
        <div class="row justify-content-center min-vh-100 align-items-center">
            <div class="col-md-5">

                <div class="card shadow border-0">
                    <div class="card-body p-4">

                        <h2 class="text-center mb-4">User Registration</h2>

                        <form id="regfrm" method="post">
                            <div class="mb-3" id="uerror">
                                <label class="form-label">Username</label>
                                <input
                                    id="username"
                                    type="text"
                                    class="form-control"
                                    placeholder="Enter username">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input
                                id="email"
                                    type="email"
                                    class="form-control"
                                    placeholder="Enter email">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input
                                    id="pwd"
                                    type="password"
                                    class="form-control"
                                    placeholder="Enter password">
                                <div id="pwderr" style="color: red;display: none;">
                                    <p id="pwd-1">A-Z a-z</p>
                                    <p id="pwd-2">0-9</p>
                                    <p id="pwd-3">special symbol</p>
                                    <p id="pwd-4">max len >= 8</p>
                                </div>    
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Contact Number</label>
                                <input
                                    id="contact"
                                    type="tel"
                                    class="form-control"
                                    placeholder="Enter contact number">
                            </div>
                             <div class="mb-3">
                                <label class="form-label">Contact Hobby:</label>
                                <input
                                    type="checkbox"
                                    id="hobby"
                                    placeholder="Enter contact number" value="Music">Music
                                     <input
                                    type="checkbox"
                                    id="hobby"
                                    placeholder="Enter contact number" value="Dance">Dance
                                     <input
                                    type="checkbox"
                                    id="hobby"
                                    placeholder="Enter contact number" value="Sports">Sports

                            </div>

                            <button type="submit" class="btn btn-primary w-100">
                                Register
                            </button>
                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
