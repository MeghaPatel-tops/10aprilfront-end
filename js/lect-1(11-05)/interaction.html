<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function alertExample(){
            alert('Welcome to js tutorials')
        }
        function promptExample(){
            let qty = prompt('Enter Quantity');
            alert(qty)
        }
        function confirmExample(){
            let res = confirm('Are you sure to delete items');
            alert(res);
        }
    </script>
</head>
<body>
    
    <button onclick="alertExample()">Alert Example</button>
    <button onclick="promptExample()">Prompt Example</button>
    <button onclick="confirmExample()">Confirm Example</button>
</body>
</html>
