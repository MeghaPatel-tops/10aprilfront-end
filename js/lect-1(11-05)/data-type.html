<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        //==============Number==================
        let num=123;
        console.log(num);
        console.log(typeof(num));

        //=============String================
        let name="tops";
        console.log(name);
        console.log(typeof(name));

        //==============BigInt===============
        let bigNum = 179997979n;
        console.log(bigNum);
        console.log(typeof(bigNum));

        //===============Boolean================
        let flag = true;
        console.log(flag);
        console.log(typeof(flag));

        //=================Null===========
        let data = null;
        console.log(null);
        console.log(typeof(null));

        //===================undefine==============
        let UserInfo ;
        console.log(UserInfo);
        console.log(typeof(UserInfo));

        //==================Object===============
        let user={
            name:'megha',
            email:'megha@gmail.com'
        }

        console.log(user);
        console.log(typeof(user));
        
        //=====================Symbol ==================
        let id = Symbol('id');
        console.log(id);
        console.log(typeof(id));
        
        
        
        
        
        


        
        
        
        
        
        
        
        
    </script>
</head>

</body>
</html>
