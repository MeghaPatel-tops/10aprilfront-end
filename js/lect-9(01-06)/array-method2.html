<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>
    <div class="container mt-5">
        <h2 class="mb-4">Product List</h2>
        <div class="p-5 d-flex gap-3" id="btn-div">

        </div>
        <table class="table table-bordered table-hover">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Product Name</th>
                    <th>Category Name</th>
                    <th>Price</th>
                    <th>Description</th>

                </tr>
            </thead>

            <tbody id="pdata">

            </tbody>
        </table>

    </div>

    <script>
        const products = [
            {
                id: 1,
                pname: "iPhone 15",
                catename: "Mobile",
                price: 79999,
                description: "Latest Apple smartphone with A16 Bionic chip."
            },
            {
                id: 2,
                pname: "Samsung Galaxy S24",
                catename: "Mobile",
                price: 74999,
                description: "Premium Android smartphone with excellent camera."
            },
            {
                id: 3,
                pname: "HP Pavilion Laptop",
                catename: "Laptop",
                price: 58999,
                description: "Powerful laptop for work, coding, and entertainment."
            },
            {
                id: 4,
                pname: "Sony WH-1000XM5",
                catename: "Headphones",
                price: 24999,
                description: "Noise-cancelling wireless headphones."
            },
            {
                id: 5,
                pname: "Apple Watch Series 9",
                catename: "Smart Watch",
                price: 39999,
                description: "Advanced smartwatch with fitness tracking features."
            },
            {
                id: 6,
                pname: "Dell Pavilion Laptop",
                catename: "Laptop",
                price: 58999,
                description: "Powerful laptop for work, coding, and entertainment."
            },
        ];
        const category = ['Mobile', 'Laptop', 'Headphones', 'Smart Watch'];

        function printButton() {
            let str = ` <div class="btn btn-primary" id="btn-all" onclick="filterProductbycname('All')">All</div>`;
            category.forEach((item, index) => {
                str += `
                    <div class="btn btn-primary" id="btn-${item}" onclick="filterProductbycname('${item}')">${item}</div>
                 `
            })
            document.getElementById('btn-div').innerHTML = str;
        }
        function printProduct(products) {
            let str = "";
            products.forEach((item, index) => {
                str += `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${item.pname}</td>
                        <td>${item.catename}</td>
                        <td>₹${item.price}</td>
                        <td>${item.description}</td>
                    
                    </tr>
                `
            })
            document.getElementById('pdata').innerHTML = str;
        }
        let findProduct = products.find((item, index) => {
            if (item.catename == "Mobile") {
                return item;
            }
        })


        function filterProductbycname(catname) {
            let filterProduct;
            if (catname == 'All') {
                filterProduct = products;
            }
            else {
                filterProduct = products.filter((item, index) => {
                    if (item.catename == catname) {
                        return item;
                    }

                })
               
            }
            printProduct(filterProduct)
        }


        console.log(findProduct);



        window.onload = function () {
            printProduct(products);
            printButton()
        }

    </script>
</body>

</html>
