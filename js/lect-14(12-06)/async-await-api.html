<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <h1>Hello, world!</h1>
     <div class="container border p-5">
        <div class="row flex justify-content-between gap-5" id="pdata">

        </div>
     </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>


    <script>
       async function getProduct() {
           try {
                 let res = await fetch('https://fakestoreapi.com/products');
                 let data = await res.json();
                 printProduct(data)
           } catch (error) {
                console.log(error);
                
           }

           
        }

        function printProduct(productdata) {
            let str="";
            productdata.forEach((index,i)=>{
                str+= `
                 <div class="card" style="width: 18rem;">
                    <img src="${index.image}" class="card-img-top" alt="..."  height="200px">
                    <div class="card-body">
                        <h5 class="card-title">${index.title}</h5>
                        <p class="card-text">Price:${index.price}</p>
                        <a href="#" class="btn btn-primary">Add to cart</a>
                    </div>
                    </div>
                
                `
            })
           document.getElementById('pdata').innerHTML=str;
            

        }
        getProduct();

    </script>
</body>

</html>
