<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo CRUD Design</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <style>
        body {
            background-color: #f4f7fc;
        }

        .todo-card {
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .table td,
        .table th {
            vertical-align: middle;
        }

        .badge-status {
            font-size: 14px;
            padding: 8px 12px;
        }
    </style>
</head>

<body>

    <div class="container py-5">

        <!-- Heading -->
        <div class="text-center mb-4">
            <h1 class="fw-bold">Todo CRUD App</h1>
            <p class="text-muted">Bootstrap Todo Design UI</p>
        </div>

        <!-- Todo Form -->
        <div class="card todo-card p-4 mb-5">
            <h3 class="mb-4">Add Todo</h3>

            <form method="post" id="frm1">
                <div class="row g-3">

                    <div class="col-md-5">
                        <label class="form-label">Todo Title</label>
                        <input type="text" class="form-control" placeholder="Enter todo title" id="taskname" />
                    </div>

                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-primary" id="btn1">
                        Add Todo
                    </button >
                       

                    <button type="reset" class="btn btn-secondary">
                        Reset
                    </button>
                </div>
            </form>
        </div>

        <!-- Todo Table -->
        <div class="card todo-card p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3>Todo List</h3>

                <input type="text" class="form-control w-25" placeholder="Search Todo" />
            </div>

            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle">

                    <thead class="table-dark">
                        <tr>
                            <th>#</th>
                            <th>Title</th>
                            <th width="180">Actions</th>
                        </tr>
                    </thead>

                    <tbody id="result">

                      



                    </tbody>



                </table>
            </div>
        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let todoArray = [];
        let editId= null;
    
        

       document.getElementById('frm1').addEventListener('submit', function (e){
             e.preventDefault(); 
            let taskname = document.getElementById('taskname').value;

            if(editId == null){
                    todoArray.push(taskname);
                    console.log(todoArray);
            }
            else{
                  console.log(editId);
            
            todoArray.splice(editId,1,taskname)
            console.log(todoArray);
            document.getElementById('btn1').textContent="Add Todo"
            }
            document.getElementById('taskname').value=""
            printTodo();
            editId=null
            
        })

        function printTodo(){
            let str="";
            for(i=0;i<todoArray.length;i++){
                str+=`
                  <tr>
                            <td>${i+1}</td>
                            <td>${todoArray[i]}</td>

                            <td>
                                <button type="button" class="btn btn-sm btn-success" onclick="editTAsk(${i})">
                                    Edit
                                </button>

                                <button type="button" class="btn btn-sm btn-danger" onclick="delTAsk(${i})">
                                    Delete
                                </button>
                            </td>
                        </tr>
                `
            }
            document.getElementById('result').innerHTML=str;
        }

        function delTAsk(id){
            todoArray.splice(id,1);
            printTodo();
        }
        function editTAsk(id){
            document.getElementById('btn1').textContent="Update Todo"
             document.getElementById('taskname').value=todoArray[id];
             editId=id;
        }

       
        window.onload=printTodo();
    </script>
</body>

</html>
