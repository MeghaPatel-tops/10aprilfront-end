<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table align="center" border="1" cellspacing="10px" cellpadding="10px">
        <form method="post" >
            <tr>
                <th>Username:</th>
                <td><input type="text" name="" id="" required></td>
                <th>Email:</th>
                <td><input type="email" name="" id="" required></td>
            </tr>
            <tr>
                <th>Password</th>
                <td><input type="password" name="" id=""></td>
                <th>DateOfBirh</th>
                <td><input type="date" name="" id=""></td>
            </tr>
            <tr>
                <th>Hobby</th>
                <td>
                    <input type="checkbox" name="" id="" value="music">Music
                    <input type="checkbox" name="" id="" value="dance">Dance
                    <input type="checkbox" name="" id="" value="sports">Sports
                </td>
                <th>Gender</th>
                <td>
                    <input type="radio" name="gender" id="" value="male">Male
                    <input type="radio" name="gender" id="" value="female">Female
                </td>
            </tr>
            <tr>
                <th>Address:</th>
                <td><textarea name="" id=""></textarea></td>
                <th>City</th>
                <td>
                    <select name="" id="">
                        <option value="surat">Surat</option>
                        <option value="vadodra">Vadodra</option>
                        <option value="bardoli">Bardoli</option>
                        <option value="vapi">Vapi</option>
                    </select>
                </td>

            </tr>
            <tr>
                <td colspan="4" align="center">
                    <input type="submit" value="Submit">
                </td>
            </tr>
        </form>
    </table>

    <h2>Extra input</h2>
    <fieldset>
        <legend>Extra inputs Example</legend>
        <form method="post">
             <label for="">DateTime</label>
        <input type="datetime-local" name="" id="">
        <br><br>
        <label for="">Color:</label>
        <input type="color" name="" id="">
        <br><br>
        <label for="">File:</label>
        <input type="file" name="" id="">
        <br><br>
        <label for="">Number:</label>
        <input type="number" name="" id="">
        </form>
    </fieldset>
</body>
</html>
