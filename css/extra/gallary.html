<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: flex;
            justify-content: center;
        }
        .main{
            border: 2px solid blue;
            width: 60%;
           
        }
        .row1{
            height: 500px;
             display: grid;
            gap:5px;
           grid-template-columns: repeat(4,1fr);
           grid-template-rows: repeat(4,1fr);
        }
        .col{
            height: 100%;
            width: 100%;
            border:2px solid black;
        }
        img{
            height: 100%;
            width: 100%;
        }
        #col-1{
           grid-row: 1 / span 2;
           grid-column:  1 / span 2;
        }
        #col-2{
            display: grid;
            /* grid-template-areas: " one one third"
                "one one third"
                "one one forth"
                "two two fifth"
                "two two fifth"
                "two two fifth"; */
            grid-template-columns: 2fr 1fr;
            grid-template-rows:2fr 0.5fr 0.5fr 2fr;
            
            gap:5px;
        }
        .in{
            background-color: gray;
            height: 100%;
            width: 100%;
        }
        
         #in-1{
            grid-row:  1 / span 2;
        }
        #in-4{
             grid-row:  3 / span 2;
        }
        #in-2{
            grid-row: 1 / span 1
        }
        #in-3{
            grid-row:  2 / span 2
        }
        
        /* #in-4{
            grid-row: 3 / span 1;
        } */
         /*#in-3{
             grid-area:third;
        }
        #in-4{
             grid-area: forth;
        }
        #in-5{
             grid-area: fifth;
        } */
      
      
        
       
    </style>
</head>
<body>
    <div class="main">
         <div class="row1">
             <div class="col" id="col-1"></div>
             <div class="col" id="col-2">
                  <div class="in" id="in-1">1</div>
                  <div class="in" id="in-2">2</div>
                  <div class="in" id="in-3">3</div>
                  <div class="in" id="in-4">4</div>
                  <div class="in" id="in-5">5</div>
             </div>
             <div class="col" id="col-3"></div>
             <div class="col" id="col-4"></div>
             <div class="col" id="col-5"></div>
             <div class="col" id="col-6"></div>
             <div class="col" id="col-7"></div>
             <div class="col" id="col-8"></div>
         </div>
    </div>
</body>
</html>
